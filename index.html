
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kepler Development</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#000;
    display:flex; align-items:center; justify-content:center;
    font-family: 'Share Tech Mono', monospace;
    overflow:hidden;
    user-select:none;
  }
  .center {
    text-align:center;
    animation: fadeIn 2.5s ease forwards;
    opacity:0;
  }
  @keyframes fadeIn {
    0%{ opacity:0; transform:translateY(6px); }
    100%{ opacity:1; transform:translateY(0); }
  }
  .lock { font-size:32px; margin-bottom:22px; filter:brightness(0.2); }
  .line { width:36px; height:1px; background:#1c1c1c; margin:18px auto; }
  .message {
    font-size:12px;
    color:#222;
    letter-spacing:3px;
    text-transform:uppercase;
    line-height:1.9;
  }
  .sub {
    font-size:10px;
    color:#181818;
    letter-spacing:2px;
    margin-top:10px;
    display:block;
  }
</style>
</head>
<body>
  <div class="center">
    <div class="lock">•</div>
    <div class="line"></div>
    <div class="message">
      This File Was Protected Using The Kepler Development
      <span class="sub">— unauthorized access is prohibited —</span>
    </div>
    <div class="line"></div>
  </div>
</body>
</html>
